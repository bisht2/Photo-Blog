<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moments in Motion — Itsy Bitsy</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-primary: #111111;
      --color-black: #000000;
      --color-white: #ffffff;
      --color-text-muted: rgba(255, 255, 255, 0.7);
      --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --spacing-20: 0.5rem;
      --spacing-30: clamp(0.5rem, 1vw, 1rem);
      --spacing-40: clamp(0.75rem, 1.5vw, 1.5rem);
      --spacing-50: clamp(1rem, 2vw, 2rem);
      --spacing-60: clamp(1.5rem, 3vw, 3rem);
      --spacing-70: clamp(2rem, 4vw, 4rem);
      --font-size-small: clamp(0.825rem, 0.825rem + ((1vw - 0.2rem) * 0.433), 1.0625rem);
      --font-size-medium: clamp(1.25rem, 3vw, 1.5rem);
      --font-size-large: clamp(2.5rem, 3vw, 3rem);
      --font-size-xlarge: clamp(3.5rem, 8vw, 8rem);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-body);
      line-height: 1.5;
      color: var(--color-white);
      background-color: var(--color-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 0 var(--spacing-50);
    }

    a { color: inherit; text-decoration: none; transition: opacity 0.2s ease; }
    a:hover { opacity: 0.8; }
    ul { list-style: none; }
    img, video { max-width: 100%; display: block; height: auto; }
    ::selection { background: var(--color-white); color: var(--color-black); }

    h1, h2, h3, h4 { font-family: var(--font-body); font-weight: 700; line-height: 1.1; }
    h1 { font-size: var(--font-size-xlarge); letter-spacing: -0.2rem; margin: 0; }
    h2 { font-size: var(--font-size-large); letter-spacing: -0.01rem; margin: 0; }
    h3 { font-size: var(--font-size-medium); font-weight: 500; margin: 0; }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--color-primary);
      padding: var(--spacing-50) 0;
      margin: 0 calc(var(--spacing-50) * -1);
      padding-left: var(--spacing-50);
      padding-right: var(--spacing-50);
    }
    .header__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header__logo {
      font-size: var(--font-size-large);
      font-weight: 700;
      letter-spacing: 0;
    }

    .nav__list {
      display: flex;
      gap: var(--spacing-40);
      align-items: center;
    }
    .nav__link {
      font-size: var(--font-size-small);
      font-weight: 400;
      color: var(--color-white);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.3s ease;
      position: relative;
    }
    .nav__link::after {
      content: '';
      position: absolute;
      bottom: 0.25rem;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 60%;
      height: 2px;
      background: var(--color-white);
      transition: transform 0.3s ease;
    }
    .nav__link:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .nav__link:hover::after,
    .nav__link.active::after {
      transform: translateX(-50%) scaleX(1);
    }

    /* Film Header */
    .film-header {
      padding: var(--spacing-70) 0;
      max-width: 800px;
    }
    .film-header__back {
      font-size: var(--font-size-small);
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-30);
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .film-header__back:hover {
      color: var(--color-white);
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(-4px);
    }
    .film-header__title {
      font-size: var(--font-size-xlarge);
      font-weight: 700;
      letter-spacing: -0.2rem;
      margin-bottom: var(--spacing-30);
    }
    .film-header__meta {
      font-size: var(--font-size-medium);
      color: var(--color-text-muted);
    }

    /* Video Container */
    .video-container {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-30);
      margin-bottom: var(--spacing-70);
    }
    .video-container__player {
      max-width: 90%;
      max-height: 80vh;
      margin: 0 auto;
      background: var(--color-black);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6),
                  0 4px 16px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .video-container__player:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 64px rgba(0, 0, 0, 0.7),
                  0 8px 24px rgba(0, 0, 0, 0.5);
    }
    .video-container__player video {
      width: 100%;
      max-height: 80vh;
      height: auto;
      display: block;
    }
    .video-container__caption {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      font-style: italic;
      text-align: center;
    }

    /* Footer */
    .footer {
      padding: var(--spacing-70) 0;
      margin-top: var(--spacing-70);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .footer__inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-50);
    }
    .footer__brand {
      font-size: var(--font-size-medium);
      font-weight: 700;
    }
    .footer__nav {
      display: flex;
      gap: var(--spacing-40);
    }
    .footer__nav a {
      font-size: var(--font-size-small);
      color: var(--color-white);
    }
    .footer__copyright {
      font-size: var(--font-size-small);
      color: var(--color-text-muted);
      text-align: center;
      margin-top: var(--spacing-50);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 0 var(--spacing-30); }
      .header {
        padding-left: var(--spacing-30);
        padding-right: var(--spacing-30);
        margin-left: calc(var(--spacing-30) * -1);
        margin-right: calc(var(--spacing-30) * -1);
      }
      .film-header {
        padding: var(--spacing-50) 0;
      }
      .film-header__title {
        font-size: clamp(2.5rem, 10vw, 4rem);
        letter-spacing: -0.1rem;
      }
      .video-container__player {
        width: 100%;
      }
      .footer__inner {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <nav class="nav">
        <ul class="nav__list">
          <li><a href="../about.html" class="nav__link">About</a></li>
          <li><a href="../journeys.html" class="nav__link">Journeys</a></li>
          <li><a href="../films.html" class="nav__link active">Films</a></li>
        </ul>
      </nav>
      <a href="../index.html" class="header__logo">Itsy Bitsy</a>
    </div>
  </header>

  <!-- Film Header -->
  <section class="film-header">
    <a href="../films.html" class="film-header__back">← Back to Films</a>
    <h1 class="film-header__title">Moments in Motion</h1>
    <p class="film-header__meta">Film · 3:45</p>
  </section>

  <!-- Video Container -->
  <section class="video-container">
    <div class="video-container__player">
      <video controls poster="../images/journeys/_optimized/everglades/DSC05504-large.jpg">
        <!-- TODO: Replace with YouTube/Vimeo/Cloudflare Stream embed URL for better streaming -->
        <!-- The original MP4 (32MB) exceeds Cloudflare Pages' 25MB file limit -->
        <source src="../images/films/C0071.MP4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
    <p class="video-container__caption">A visual meditation on movement and stillness</p>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__brand">
        <a href="../index.html">Itsy Bitsy</a>
      </div>
      <nav class="footer__nav">
        <a href="../about.html">About</a>
        <a href="../journeys.html">Journeys</a>
        <a href="../films.html">Films</a>
      </nav>
    </div>
    <p class="footer__copyright">© 2024 Itsy Bitsy. All rights reserved.</p>
  </footer>
</body>
</html>
